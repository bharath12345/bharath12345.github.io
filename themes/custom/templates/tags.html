{% extends "base.html" %}

{% block title %}Tags - {{ SITENAME }}{% endblock %}

{% block content %}
<section class="content">
    <h2>Tags</h2>
    <hr>
    <div class="row">
        {% for tag, articles in tags|sort %}
        <div class="col-md-4 col-sm-6 mb-3">
            <h4>
                <a href="{{ SITEURL }}/{{ tag.url }}">{{ tag }}</a>
                <span class="badge bg-primary">{{ articles|count }}</span>
            </h4>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
